<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
  
  <!-- Internal CSS (Light Theme) -->
  <style>
    body {
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9; /* light background instead of black */
    }

    .bmi-section {
      background: #ffffff; /* pure white section */
      color: #333333;      /* dark text for contrast */
      padding: 50px 20px;
      text-align: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1); /* soft shadow */
      border-radius: 15px;
      max-width: 500px;
      margin: 50px auto;
    }

    .bmi-container h2 {
      margin-bottom: 10px;
      font-size: 28px;
      color: #1e3a8a; /* soft blue heading */
    }

    .bmi-container p {
      margin-bottom: 25px;
      font-size: 16px;
      color: #555555;
    }

    .bmi-form label {
      display: block;
      text-align: left;
      margin: 10px 0 5px;
      font-weight: 600;
    }

    .bmi-form input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .bmi-form button {
      width: 100%;
      padding: 12px;
      background: #4caf50; /* green button for light theme */
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .bmi-form button:hover {
      background: #45a049; /* darker green on hover */
    }

    .bmi-result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #1e3a8a;
    }
  </style>
</head>

<body>
    
<header class="main-header">
    <h1>Fitrack</h1>
</header>


  <section class="bmi-section">
    <div class="bmi-container">
      <h2>Calculate Your BMI</h2>
      <p>Check your body mass index easily!</p>
      <div class="bmi-form">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g., 60" min="1">

        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="e.g., 170" min="1">

        <button onclick="calculateBMI()">Calculate BMI</button>
      </div>
      <div class="bmi-result" id="bmiResult"></div>
    </div>
  </section>

  <!-- JavaScript -->
  <script>
    function calculateBMI() {
      let weight = document.getElementById("weight").value;
      let height = document.getElementById("height").value;

      if(weight > 0 && height > 0) {
        let bmi = (weight / ((height/100) ** 2)).toFixed(2);
        let status = "";

        if(bmi < 18.5) {
          status = "Underweight 😕";
        } else if(bmi >= 18.5 && bmi < 24.9) {
          status = "Normal 🥳";
        } else if(bmi >= 25 && bmi < 29.9) {
          status = "Overweight ⚠️";
        } else {
          status = "Obese ❌";
        }

        document.getElementById("bmiResult").innerHTML = `Your BMI is <strong>${bmi}</strong> (${status})`;
      } else {
        alert("Please enter valid weight and height!");
      }
    }
  </script>

</body>
</html>
