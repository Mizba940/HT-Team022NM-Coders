<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BMI Calculator - Fitrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="style.css">

    <style>
        /* GLOBAL STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: url('health1.jpg') no-repeat center center/cover;
            color: white;
            min-height: 100vh;
        }

        /* HEADER */
        .main-header {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 120px;
            background: rgba(15,23,42,0.9);
            border-bottom: 1px solid #1e293b;
        }
        .main-header h1 {
            color: #38bdf8;
            font-size: 2.5rem;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            background: rgba(15,23,42,0.95);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .navbar a:hover {
            color: #38bdf8;
        }

        /* BMI CARD */
        .section {
            text-align: center;
            padding: 4rem 2rem;
        }
        .bmi-card {
            background: rgba(15,23,42,0.9);
            padding: 2.5rem;
            border-radius: 15px;
            max-width: 400px;
            margin: 2rem auto;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .bmi-card:hover {
            transform: translateY(-5px);
        }
        .bmi-card label {
            display: block;
            margin: 0.8rem 0 0.3rem;
            font-weight: 600;
            color: #38bdf8;
            font-size: 1.1rem;
        }
        .bmi-card input {
            width: 90%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .bmi-card input:focus {
            box-shadow: 0 0 10px #38bdf8;
        }
        .btn {
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            padding: 0.8rem 2rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        .btn:hover {
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
        }
        .bmi-result {
            margin-top: 1.5rem;
            font-size: 1.3rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

<header class="main-header">
    <h1>Fitrack</h1>
</header>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="bmi.html">BMI</a>
    <a href="workout.html">Workout</a>
    <a href="diet.html">Diet</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="contact.html">contact us</a>
</nav>

<section class="section">
    <h3>BMI Calculator</h3>
    <div class="bmi-card">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g., 60">

        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="e.g., 170">

        <button class="btn" onclick="calculateBMI()">Calculate</button>

        <div id="result" class="bmi-result"></div>
    </div>
</section>
<footer>
    © 2026 SmartFit | Hackathon Project
</footer>
<script>
function calculateBMI() {
    const weight = parseFloat(document.getElementById('weight').value);
    const height = parseFloat(document.getElementById('height').value);
    const resultDiv = document.getElementById('result');

    if(weight > 0 && height > 0){
        const bmi = (weight / ((height/100) ** 2)).toFixed(1);
        let status = '';
        let color = '';

        if(bmi < 18.5) { status = 'Underweight'; color = '#facc15'; }       // yellow
        else if(bmi < 24.9) { status = 'Normal'; color = '#22c55e'; }      // green
        else if(bmi < 29.9) { status = 'Overweight'; color = '#f97316'; }  // orange
        else { status = 'Obese'; color = '#ef4444'; }                       // red

        resultDiv.innerHTML = `Your BMI is <strong>${bmi}</strong> (${status})`;
        resultDiv.style.color = color;
    } else {
        alert("Please enter valid weight and height!");
    }
}
</script>

</body>
</html>
