<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Fitrack</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
        }

        /* HEADER */
        .main-header {
            text-align: center;
            padding: 2rem;
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }

        .main-header h1 {
            color: #38bdf8;
            font-size: 2.5rem;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            background: #1e293b;
            padding: 1rem 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .navbar a:hover {
            color: #38bdf8;
        }

        /* SECTION */
        .section {
            padding: 4rem 2rem;
            text-align: center;
        }

        .section h2 {
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        /* CONTACT CARD */
        .contact-card {
            background: #1e293b;
            max-width: 600px;
            margin: auto;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        .contact-card:hover {
            transform: translateY(-5px);
        }

        .contact-card input,
        .contact-card textarea {
            width: 100%;
            padding: 0.9rem;
            margin: 0.8rem 0;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 1rem;
        }

        .contact-card textarea {
            resize: none;
            height: 120px;
        }

        .btn {
            background: linear-gradient(90deg, #38bdf8, #0ea5e9);
            color: #0f172a;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
        }

        /* SOCIAL SECTION */
        .social {
            margin-top: 2.5rem;
        }

        .social a {
            margin: 0 15px;
            font-size: 2.2rem;
            text-decoration: none;
            transition: 0.3s;
        }

        .social a:hover {
            transform: scale(1.3);
        }

        /* MAP */
        .map {
            margin-top: 3rem;
        }

        iframe {
            width: 100%;
            max-width: 800px;
            height: 300px;
            border-radius: 15px;
            border: none;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background: #0f172a;
            margin-top: 3rem;
        }

        /* RESPONSIVE */
        @media(max-width: 600px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

<header class="main-header">
    <h1>SmartFit</h1>
</header>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="bmi.html">BMI</a>
    <a href="activity.html">Activity</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="section">
    <h2>Contact Us</h2>

    <div class="contact-card">
        <input type="text" placeholder="👤 Your Name">
        <input type="email" placeholder="📧 Your Email">
        <textarea placeholder="✍️ Your Message"></textarea>

        <button class="btn">🚀 Send Message</button>
    </div>

    <!-- SOCIAL EMOJI LINKS -->
    <div class="social">
        <a href="#" title="Instagram">📸</a>
        <a href="#" title="Facebook">📘</a>
        <a href="#" title="Email">📧</a>
        <a href="#" title="Phone">📞</a>
    </div>

    <!-- GOOGLE MAP -->
    <div class="map">
        <h3>📍 Our Location</h3>
        <iframe src="https://maps.google.com/maps?q=india&t=&z=5&ie=UTF8&iwloc=&output=embed"></iframe>
    </div>
</section>

<footer>
    © 2026 Fitrack | Hackathon Project
</footer>

</body>
</html>
