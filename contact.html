<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background: url('health3.jpg') no-repeat center center/cover;
            position: relative;
            color:white;
            min-height:100vh;
        }

        /* DARK OVERLAY */
        body::before{
            content:"";
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);
            z-index:-1;
        }

        header{
            text-align:center;
            padding:2rem;
        }

        header h1{
            color:#38bdf8;
        }

        nav{
            display:flex;
            justify-content:center;
            gap:2rem;
            padding:1rem 0;
        }

        nav a{
            color:white;
            text-decoration:none;
            font-weight:600;
            transition:0.3s;
        }

        nav a:hover{
            color:#38bdf8;
        }

        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            gap:3rem;
            padding:4rem 2rem;
            flex-wrap:wrap;
        }

        /* LEFT SECTION */
        .contact-info{
            background:rgba(30,41,59,0.9);
            padding:2.5rem;
            border-radius:20px;
            width:350px;
            box-shadow:0 10px 25px rgba(0,0,0,0.6);
        }

        .contact-info h2{
            margin-bottom:1.5rem;
            color:#38bdf8;
        }

        .contact-info p{
            margin:1rem 0;
        }

        .social{
            margin-top:1.5rem;
        }

        .social a{
            font-size:1.8rem;
            margin-right:15px;
            text-decoration:none;
            transition:0.3s;
        }

        .social a:hover{
            transform:scale(1.3);
        }

        /* RIGHT SECTION */
        .contact-form{
            background:rgba(30,41,59,0.9);
            padding:2.5rem;
            border-radius:20px;
            width:400px;
            box-shadow:0 10px 25px rgba(0,0,0,0.6);
        }

        .contact-form h2{
            margin-bottom:1.5rem;
            color:#38bdf8;
        }

        .contact-form input,
        .contact-form textarea{
            width:100%;
            padding:0.9rem;
            margin:0.8rem 0;
            border:none;
            border-radius:10px;
            outline:none;
            font-size:1rem;
        }

        .contact-form textarea{
            resize:none;
            height:120px;
        }

        .btn{
            background:linear-gradient(90deg,#38bdf8,#0ea5e9);
            color:#0f172a;
            padding:0.8rem 2rem;
            border:none;
            border-radius:10px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            width:100%;
        }

        .btn:hover{
            background:linear-gradient(90deg,#0ea5e9,#38bdf8);
        }

        footer{
            text-align:center;
            padding:1.5rem;
            margin-top:2rem;
        }

        @media(max-width:768px){
            .container{
                flex-direction:column;
            }
        }
    </style>
</head>

<body>

<header class="main-header">
    <h1>SmartFit</h1>
</header>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="bmi.html">BMI</a>
    <a href="workout.html">Workout</a>
    <a href="diet.html">Diet</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="contact.html">contact us</a>
     <a href="login.html">login</a>
    <a href="chat.html">chatbot</a>
     <a href="regesitration.html">regesitration</a>
</nav>
<div class="container">

    <!-- LEFT SIDE -->
    <div class="contact-info">
        <h2>📞 Contact Information</h2>
        <p>📍 Address: India</p>
        <p>📧 Email: support@fitrack.com</p>
        <p>📱 Phone: +91 98765 43210</p>
        <p>⏰ Working Hours: 9 AM - 6 PM</p>

        <div class="social">
            <a href="#">📸</a>
            <a href="#">📘</a>
            <a href="#">📧</a>
            <a href="#">📞</a>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="contact-form">
        <h2>✍️ Send Us Message</h2>

        <input type="text" placeholder="👤 Your Name">
        <input type="email" placeholder="📧 Your Email">
        <textarea placeholder="💬 Your Message"></textarea>

        <button class="btn">🚀 Send Message</button>
    </div>

</div>

<footer>
    © 2026 SmartFit | Hackathon Project
</footer>

</body>
</html>
